<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5253;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="128" fill="url(#orangeGrad)" />
  
  <!-- Speed/Flow trails behind the rider (representing Flow) -->
  <path d="M60 200 H130" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.6" />
  <path d="M40 260 H110" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8" />
  <path d="M70 320 H125" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.5" />
  
  <!-- Stylized bike/scooter rider -->
  <!-- Rear Wheel -->
  <circle cx="180" cy="340" r="50" fill="none" stroke="white" stroke-width="28" />
  <circle cx="180" cy="340" r="15" fill="white" />
  
  <!-- Front Wheel -->
  <circle cx="360" cy="340" r="50" fill="none" stroke="white" stroke-width="28" />
  <circle cx="360" cy="340" r="15" fill="white" />
  
  <!-- Chassis and Frame lines -->
  <path d="M180 340 L250 260 H320 L360 340" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M250 260 L220 185 H190" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M320 260 L340 185 H360" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Rider Silhouette -->
  <!-- Rider Head -->
  <circle cx="285" cy="140" r="28" fill="white" />
  <!-- Rider Body (leaning forward dynamically) -->
  <path d="M220 235 L260 175 L305 185" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Rider Arm to Handlebar -->
  <path d="M260 175 L320 190" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
</svg>
